<svg viewBox="0 0 1460 1000" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EE5539"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="3" refY="1" orient="auto" markerUnits="strokeWidth">
      <path d="M0,6 L3,0 L6,6 Z" fill="#EE5539"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1460" height="1000" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1460" height="12" fill="#EE5539"/>

  <!-- header -->
  <text x="50" y="62" font-size="33" font-weight="bold" fill="#EE5539">City Mom Media Sales Pipeline</text>
  <text x="50" y="92" font-size="17" fill="#000000">How a lead becomes a deal, and how a deal flows to a signed, kicked-off client. A training reference for the sales team.</text>

  <!-- ============ SECTION 1: LEAD TO DEAL ============ -->
  <rect x="50" y="136" width="6" height="22" fill="#EE5539"/>
  <text x="66" y="154" font-size="20" font-weight="bold" fill="#000000">1.  Lead to Deal</text>
  <line x1="50" y1="166" x2="1410" y2="166" stroke="#FCBAC6" stroke-width="2"/>

  <!-- Leads Inbox -->
  <rect x="50" y="190" width="300" height="120" rx="12" fill="#FCBAC6" stroke="#EE5539" stroke-width="2"/>
  <text x="200" y="220" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">Leads Inbox</text>
  <text x="200" y="246" font-size="13" fill="#000000" text-anchor="middle">Cold pitch targets + inbound web leads</text>
  <text x="200" y="268" font-size="13" fill="#000000" text-anchor="middle">You work and nurture them here</text>
  <text x="200" y="292" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Not in the pipeline. Not in the forecast.</text>

  <!-- arrow inbox -> gate -->
  <line x1="354" y1="250" x2="414" y2="250" stroke="#EE5539" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Qualification Gate -->
  <rect x="420" y="190" width="300" height="120" rx="12" fill="#F8F7C4" stroke="#EE5539" stroke-width="2"/>
  <text x="570" y="216" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">Qualification Gate</text>
  <text x="570" y="240" font-size="12.5" fill="#000000" text-anchor="middle">Decision-maker identified</text>
  <text x="570" y="259" font-size="12.5" fill="#000000" text-anchor="middle">Budget, or willingness to discuss one</text>
  <text x="570" y="278" font-size="12.5" fill="#000000" text-anchor="middle">Real timeline or need, and ICP fit</text>
  <text x="570" y="299" font-size="12.5" font-weight="bold" fill="#000000" text-anchor="middle">All must be true to convert</text>

  <!-- arrow gate -> convert -->
  <line x1="724" y1="250" x2="784" y2="250" stroke="#EE5539" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Convert to Deal -->
  <rect x="790" y="190" width="300" height="120" rx="12" fill="#EE5539" stroke="#EE5539" stroke-width="2"/>
  <text x="940" y="234" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Convert to Deal</text>
  <text x="940" y="262" font-size="13" fill="#FFFFFF" text-anchor="middle">It is now a real opportunity</text>
  <text x="940" y="284" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Enters the pipeline at Qualifying</text>

  <!-- nurture loop back -->
  <path d="M610,312 C610,360 180,362 180,316" fill="none" stroke="#EE5539" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowUp)"/>
  <text x="395" y="356" font-size="12.5" font-style="italic" fill="#EE5539" text-anchor="middle">Not ready to convert? Loop back and keep nurturing in the inbox.</text>

  <!-- handoff note arrow from convert down into pipeline -->
  <line x1="940" y1="312" x2="940" y2="392" stroke="#EE5539" stroke-width="2.5" stroke-dasharray="2,0" marker-end="url(#arrow)"/>

  <!-- ============ SECTION 2: THE PIPELINE ============ -->
  <rect x="50" y="406" width="6" height="22" fill="#EE5539"/>
  <text x="66" y="424" font-size="20" font-weight="bold" fill="#000000">2.  The Sales Pipeline</text>
  <line x1="50" y1="436" x2="1410" y2="436" stroke="#FCBAC6" stroke-width="2"/>

  <!-- chevrons -->
  <!-- 1 Qualifying -->
  <polygon points="50,470 312,470 342,516 312,562 50,562 80,516" fill="#FCBAC6" stroke="#FFFFFF" stroke-width="2"/>
  <text x="200" y="523" font-size="19" font-weight="bold" fill="#000000" text-anchor="middle">Qualifying</text>
  <!-- 2 Discovery -->
  <polygon points="312,470 574,470 604,516 574,562 312,562 342,516" fill="#FA9C92" stroke="#FFFFFF" stroke-width="2"/>
  <text x="462" y="523" font-size="19" font-weight="bold" fill="#000000" text-anchor="middle">Discovery</text>
  <!-- 3 Proposal Sent -->
  <polygon points="574,470 836,470 866,516 836,562 574,562 604,516" fill="#F4775E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="724" y="523" font-size="19" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Proposal Sent</text>
  <!-- 4 Closing -->
  <polygon points="836,470 1098,470 1128,516 1098,562 836,562 866,516" fill="#F1603F" stroke="#FFFFFF" stroke-width="2"/>
  <text x="986" y="523" font-size="19" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Closing</text>
  <!-- 5 Won -->
  <polygon points="1098,470 1360,470 1390,516 1360,562 1098,562 1128,516" fill="#EE5539" stroke="#F8F7C4" stroke-width="3"/>
  <text x="1248" y="523" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Won</text>

  <!-- description cards -->
  <!-- card 1 -->
  <rect x="58" y="590" width="250" height="150" rx="10" fill="#FFFFFF" stroke="#FCBAC6" stroke-width="2"/>
  <rect x="70" y="604" width="96" height="22" rx="11" fill="#EE5539"/>
  <text x="118" y="619" font-size="11.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Rot: 7 days</text>
  <text x="70" y="652" font-size="12.5" fill="#000000">Qualified. Booking the</text>
  <text x="70" y="670" font-size="12.5" fill="#000000">discovery call.</text>
  <text x="70" y="706" font-size="11.5" font-weight="bold" fill="#EE5539">Need to advance:</text>
  <text x="70" y="723" font-size="11.5" fill="#000000">Owner, Source</text>

  <!-- card 2 -->
  <rect x="320" y="590" width="250" height="150" rx="10" fill="#FFFFFF" stroke="#FCBAC6" stroke-width="2"/>
  <rect x="332" y="604" width="104" height="22" rx="11" fill="#EE5539"/>
  <text x="384" y="619" font-size="11.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Rot: 10 days</text>
  <text x="332" y="652" font-size="12.5" fill="#000000">Active discovery. Learn</text>
  <text x="332" y="670" font-size="12.5" fill="#000000">needs, budget, timeline,</text>
  <text x="332" y="688" font-size="12.5" fill="#000000">and markets.</text>
  <text x="332" y="715" font-size="11.5" font-weight="bold" fill="#EE5539">Need to advance:</text>
  <text x="332" y="732" font-size="11.5" fill="#000000">Markets, Tier, Vertical</text>

  <!-- card 3 -->
  <rect x="582" y="590" width="250" height="150" rx="10" fill="#FFFFFF" stroke="#FCBAC6" stroke-width="2"/>
  <rect x="594" y="604" width="96" height="22" rx="11" fill="#EE5539"/>
  <text x="642" y="619" font-size="11.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Rot: 5 days</text>
  <text x="594" y="652" font-size="12.5" fill="#000000">Proposal delivered.</text>
  <text x="594" y="670" font-size="12.5" fill="#000000">Auto follow-ups at</text>
  <text x="594" y="688" font-size="12.5" fill="#000000">day 3, 7, and 12.</text>
  <text x="594" y="715" font-size="11.5" font-weight="bold" fill="#EE5539">Need to advance:</text>
  <text x="594" y="732" font-size="11.5" fill="#000000">Value, Close date, Link</text>

  <!-- card 4 -->
  <rect x="844" y="590" width="250" height="150" rx="10" fill="#FFFFFF" stroke="#FCBAC6" stroke-width="2"/>
  <rect x="856" y="604" width="96" height="22" rx="11" fill="#EE5539"/>
  <text x="904" y="619" font-size="11.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Rot: 7 days</text>
  <text x="856" y="652" font-size="12.5" fill="#000000">Verbal yes. Contract</text>
  <text x="856" y="670" font-size="12.5" fill="#000000">out, invoice in motion.</text>
  <text x="856" y="706" font-size="11.5" font-weight="bold" fill="#EE5539">Need to advance:</text>
  <text x="856" y="723" font-size="11.5" fill="#000000">Signed contract</text>

  <!-- card 5 -->
  <rect x="1106" y="590" width="250" height="150" rx="10" fill="#FFFFFF" stroke="#EE5539" stroke-width="2.5"/>
  <rect x="1118" y="604" width="120" height="22" rx="11" fill="#F8F7C4" stroke="#EE5539" stroke-width="1"/>
  <text x="1178" y="619" font-size="11.5" font-weight="bold" fill="#000000" text-anchor="middle">Counts to goal</text>
  <text x="1118" y="652" font-size="12.5" fill="#000000">Signed agreement.</text>
  <text x="1118" y="670" font-size="12.5" fill="#000000">Fires the campaign</text>
  <text x="1118" y="688" font-size="12.5" fill="#000000">handoff.</text>
  <text x="1118" y="715" font-size="11.5" font-weight="bold" fill="#EE5539">The only stage that</text>
  <text x="1118" y="732" font-size="11.5" font-weight="bold" fill="#EE5539">counts to the number.</text>

  <!-- ============ SECTION 3: EXITS AND HANDOFF ============ -->
  <rect x="50" y="786" width="6" height="22" fill="#EE5539"/>
  <text x="66" y="804" font-size="20" font-weight="bold" fill="#000000">3.  Exit and Handoff</text>
  <line x1="50" y1="816" x2="1410" y2="816" stroke="#FCBAC6" stroke-width="2"/>

  <!-- Lost card -->
  <rect x="50" y="836" width="640" height="120" rx="12" fill="#F8F7C4" stroke="#EE5539" stroke-width="2"/>
  <text x="70" y="868" font-size="17" font-weight="bold" fill="#000000">Lost (exit from any stage)</text>
  <text x="70" y="896" font-size="13.5" fill="#000000">Mark Lost and capture a required loss reason. This is how we learn what kills deals.</text>
  <text x="70" y="920" font-size="13.5" fill="#000000">If the reason is timing or budget, a re-engage task is created automatically in 90 days.</text>

  <!-- Handoff card -->
  <rect x="730" y="836" width="680" height="120" rx="12" fill="#EE5539" stroke="#EE5539" stroke-width="2"/>
  <text x="750" y="868" font-size="17" font-weight="bold" fill="#FFFFFF">Won, then Campaign Handoff</text>
  <text x="750" y="896" font-size="13.5" fill="#FFFFFF">Automatic: client welcome email, notify Alexia, generate the QuickBooks invoice.</text>
  <text x="750" y="920" font-size="13.5" fill="#FFFFFF">Create the Airtable and Asana project. Production opens in Asana at Ready for Kickoff.</text>

  <!-- arrow Won card -> handoff -->
  <line x1="1230" y1="742" x2="1230" y2="832" stroke="#EE5539" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- footer -->
  <text x="50" y="982" font-size="12" font-style="italic" fill="#000000">Automation requires Pipedrive Advanced or higher. The Won handoff to Airtable and Asana runs through Zapier or Make.</text>
</svg>
